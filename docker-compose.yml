services:
  chrome:
    image: selenium/standalone-chrome:latest
    ports:
      - "4444:4444" # Port for the Selenium Grid Hub (remote connection)
      - "9222:9222" # Port for VNC viewer (optional, for viewing the browser GUI)
    shm_size: 2g # Recommended to use host's shared memory
    environment:
      - VNC_ENABLE=true # Enable VNC
      - VNC_NO_PASSWORD=true # Set to true for no password access, adjust as needed
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      start_interval: 1s
      start_period: 10s
    expose:
      - "5432"
    ports:
      - "${POSTGRES_PORT}:5432"

  app:
    build:
      context: .
    env_file:
      - .env
    environment:
      - INPUT_FILE=/data/test.xlsx
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/code/data

    command: ["python", "-m", "app.main"]
